<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Onsitego — Interactive Prototype v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#006877; --primary-light:#007d8f; --primary-lighter:#008fa3;
  --primary-tint:#d0eef2; --primary-pale:#e8f6f8;
  --secondary:#ffc20e; --secondary-soft:#fff5cc; --secondary-text:#a07800;
  --bg:#ffffff; --card:#ffffff; --text:#0d3040; --muted:#6b8a93; --line:#d8e8ec;
  --live-bg:#e1f4e9; --live-text:#1f9a59;
  --blue-bg:#e6eefb; --blue-text:#3266c9;
  --red-bg:#fdecec; --red-text:#d64545;
  --shadow:0 6px 22px rgba(0,104,119,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Montserrat',sans-serif;font-weight:400;
  background:#b8d0d6;
  background-image:radial-gradient(circle at 20% 10%,#c5dce2,transparent 55%),radial-gradient(circle at 80% 90%,#b0ccd2,transparent 55%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 0;color:var(--text);
}
.phone{position:relative;width:390px;height:844px;background:#0c1f22;border-radius:54px;padding:13px;box-shadow:0 30px 70px rgba(0,40,50,.45),0 4px 0 rgba(255,255,255,.04) inset;}
.screenwrap{position:relative;width:100%;height:100%;background:#ffffff;border-radius:42px;overflow:hidden;display:flex;flex-direction:column;}
#screens{position:relative;flex:1;min-height:0;}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#0c1f22;border-radius:0 0 20px 20px;z-index:60;}
.statusbar{height:50px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 6px;font-size:13px;font-weight:700;color:var(--text);position:relative;z-index:50;flex:0 0 auto;}
.statusbar .dots{display:flex;gap:5px;align-items:center;}

.screen{position:absolute;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:96px;}
.scroll::-webkit-scrollbar{width:0;}

/* appbar */
.appbar{display:flex;align-items:center;justify-content:space-between;padding:6px 20px 10px;}
.logo{display:flex;align-items:center;font-weight:700;font-size:22px;letter-spacing:-.3px;color:var(--primary);}
.logo b{color:var(--secondary);font-weight:700;}
.appbar-right{display:flex;align-items:center;gap:10px;}
.lang{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--primary);}
.iconbtn{width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.iconbtn .dot{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--red-text);border:2px solid #fff;}
.back-dash-btn{background:var(--primary-pale);border:1px solid var(--primary-tint);border-radius:20px;padding:5px 11px;font-size:11px;color:var(--primary);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}

/* section titles */
.kicker{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--primary-lighter);text-transform:uppercase;margin:0 20px 2px;}
.sec-title{font-size:20px;font-weight:700;letter-spacing:-.3px;margin:0 20px 14px;display:flex;align-items:center;justify-content:space-between;}
.sec-title .count{font-size:12px;background:var(--primary-tint);color:var(--primary);padding:5px 11px;border-radius:20px;}
.sec-title .viewall{font-size:13px;color:var(--primary-light);cursor:pointer;}
.block{margin-top:26px;}

/* quick actions */
.quick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;padding:4px 20px 0;}
.qa{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px 10px;text-align:center;cursor:pointer;position:relative;transition:.18s;box-shadow:var(--shadow);}
.qa:active{transform:scale(.96);}
.qa .ic{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 9px;}
.qa.p1 .ic{background:var(--primary-tint);} .qa.p2 .ic{background:var(--secondary-soft);} .qa.p3 .ic{background:var(--blue-bg);}
.qa .lbl{font-size:12px;line-height:1.2;}
.qa .badge{position:absolute;top:10px;right:12px;background:var(--primary);color:#fff;font-size:11px;font-weight:700;min-width:21px;height:21px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;}

/* SR rail */
.rail{display:flex;gap:13px;overflow-x:auto;padding:2px 20px 8px;scroll-snap-type:x mandatory;}
.rail::-webkit-scrollbar{display:none;}
.srcard{flex:0 0 88%;scroll-snap-align:start;background:#fff;border:1px solid var(--line);border-radius:22px;padding:17px;box-shadow:var(--shadow);}
.srcard .top{display:flex;justify-content:space-between;align-items:flex-start;}
.srcard h4{font-size:17px;font-weight:700;}
.srcard .srno{font-size:12px;color:var(--muted);margin-top:7px;}
.srcard .meta{font-size:13px;margin-top:2px;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:5px 10px;border-radius:20px;}
.pill.live{background:var(--live-bg);color:var(--live-text);}
.pill.blue{background:var(--blue-bg);color:var(--blue-text);}
.pill.closed-pill{background:var(--red-bg);color:var(--red-text);}
.pill .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
.stamp{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--secondary-soft);color:var(--secondary-text);padding:7px 12px;border-radius:20px;margin-top:14px;}
.stamp .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
.srcard .row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px;}
.btn{background:var(--primary);color:#fff;border:none;border-radius:14px;padding:11px 18px;font-size:13px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;}
.btn:active{transform:scale(.96);} .btn.ghost{background:#fff;color:var(--primary);border:1.5px solid var(--primary);}
.btn.full{width:100%;justify-content:center;}
.btn.sm{padding:9px 14px;font-size:12px;}
.btn.yellow{background:var(--secondary);color:#5a4000;}
.dots-ind{display:flex;gap:6px;justify-content:center;margin-top:12px;}
.dots-ind i{width:7px;height:7px;border-radius:50%;background:#cdd6d1;}.dots-ind i.on{width:20px;border-radius:4px;background:var(--primary-light);}

/* stats banner */
.statbanner{margin:0 20px;background:linear-gradient(120deg,var(--primary),var(--primary-light));border-radius:22px;padding:20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;box-shadow:var(--shadow);}
.statbanner .s{text-align:center;}
.statbanner .n{font-size:23px;font-weight:700;color:var(--secondary);}
.statbanner .t{font-size:11px;color:#b8e4ec;margin-top:3px;}

/* promise */
.promise{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;padding:0 20px;}
.pcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 8px;text-align:center;box-shadow:var(--shadow);}
.pcard .ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 9px;}
.pcard:nth-child(1) .ic{background:var(--primary-tint);} .pcard:nth-child(2) .ic{background:var(--secondary-soft);} .pcard:nth-child(3) .ic{background:var(--primary-tint);}
.pcard .lbl{font-size:12px;line-height:1.25;}

/* partners */
.partners{display:flex;gap:10px;overflow-x:auto;padding:0 20px;}
.partners::-webkit-scrollbar{display:none;}
.partner{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 18px;font-size:14px;box-shadow:var(--shadow);}

/* feedback */
.feedback{margin:0 20px;background:linear-gradient(120deg,var(--primary),var(--primary-light));border-radius:22px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow);}
.feedback .ic{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.feedback .tx{flex:1;color:#fff;} .feedback h4{font-size:15px;font-weight:700;} .feedback p{font-size:12px;opacity:.9;margin-top:2px;}
.feedback .go{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--primary);flex:0 0 auto;}

/* ratings */
.ratings{display:flex;gap:11px;padding:0 20px;}
.rate{flex:1;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow);}
.rate .lg{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex:0 0 auto;}
.rate .sc{font-size:15px;font-weight:700;} .rate .sc small{font-size:11px;color:var(--muted);} .rate .stars{font-size:10px;color:var(--secondary);}

/* tabbar */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:78px;background:#fff;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding-bottom:8px;z-index:40;}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--muted);font-size:11px;flex:1;}
.tab.on{color:var(--primary);}
.tab .lbl{line-height:1.05;text-align:center;}

/* fab */
.fab{position:absolute;bottom:96px;right:18px;width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,var(--primary-light),var(--primary));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(0,104,119,.35);cursor:pointer;z-index:45;}
.fab .d{position:absolute;top:6px;right:8px;width:13px;height:13px;border-radius:50%;background:var(--secondary);border:2px solid #fff;}
.fab:active{transform:scale(.93);}

/* page head */
.pagehead{display:flex;align-items:center;gap:12px;padding:6px 18px 14px;}
.pagehead .back{width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;}
.pagehead h2{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.pagehead .sub{font-size:12px;color:var(--muted);}

/* card */
.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;margin:0 18px 14px;box-shadow:var(--shadow);}
.card-h{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.card-h h3{font-size:15px;font-weight:700;}
.chev{transition:.25s;color:var(--muted);}
.collapsed .chev{transform:rotate(-90deg);}
.collapsed .card-body{display:none;}
.kv{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line);}
.kv:last-child{border:none;} .kv .k{color:var(--muted);} .kv .v{font-weight:700;}
.warn{display:flex;align-items:center;gap:8px;background:var(--secondary-soft);color:var(--secondary-text);font-size:12px;padding:10px 12px;border-radius:12px;margin-top:12px;}
.copay{display:flex;align-items:center;justify-content:space-between;background:var(--red-bg);color:var(--red-text);font-size:13px;padding:12px 14px;border-radius:14px;margin-top:12px;}

/* timeline */
.tl{margin-top:8px;} .tl .item{display:flex;gap:13px;padding-bottom:4px;}
.tl .marker{display:flex;flex-direction:column;align-items:center;}
.tl .mk{width:14px;height:14px;border-radius:50%;border:3px solid var(--primary-light);background:#fff;margin-top:3px;}
.tl .item.done .mk{background:var(--primary-light);}
.tl .item.now .mk{background:var(--secondary);border-color:var(--secondary);box-shadow:0 0 0 4px var(--secondary-soft);}
.tl .line{flex:1;width:2px;background:var(--line);min-height:18px;}
.tl .item:last-child .line{display:none;}
.tl .tx{padding-bottom:16px;} .tl .tx .t{font-size:13px;font-weight:700;} .tl .tx .d{font-size:11px;color:var(--muted);margin-top:2px;}

/* doc rows */
.docrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
.docrow:last-child{border:none;}
.docrow .ic{width:40px;height:40px;border-radius:11px;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--primary);}
.docrow .info{flex:1;} .docrow .info .t{font-size:13px;font-weight:700;} .docrow .info .s{font-size:11px;color:var(--muted);}
.docrow .acts{display:flex;gap:8px;}
.miniic{width:34px;height:34px;border-radius:10px;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--primary);}

/* capsule */
.capsule{display:inline-flex;align-items:center;gap:8px;background:var(--primary-pale);color:var(--primary);font-size:12px;padding:9px 14px;border-radius:20px;margin-top:12px;}

/* help grid */
.helpgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.helpbtn{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px;font-size:13px;cursor:pointer;transition:.15s;}
.helpbtn:active{transform:scale(.97);border-color:var(--primary-light);}
.helpbtn .ic{color:var(--primary);display:flex;}

/* tabs */
.tabs{display:flex;gap:8px;background:#dde8eb;border-radius:16px;padding:5px;margin:0 18px 16px;}
.tabs .t{flex:1;text-align:center;padding:10px;font-size:13px;border-radius:12px;cursor:pointer;color:var(--muted);}
.tabs .t.on{background:#fff;color:var(--primary);box-shadow:0 2px 8px rgba(0,104,119,.08);}
.tabpane{display:none;} .tabpane.on{display:block;}

/* search */
.search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 15px;margin:0 18px 16px;color:var(--muted);box-shadow:var(--shadow);}
.search input{border:none;outline:none;flex:1;font-family:inherit;font-size:14px;color:var(--text);background:transparent;}

/* plan card */
.plancard{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;margin:0 18px 14px;box-shadow:var(--shadow);}
.plancard .ph{display:flex;gap:13px;align-items:flex-start;}
.plancard .pic{width:50px;height:50px;border-radius:14px;background:var(--primary-tint);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--primary);}
.plancard .pt{flex:1;} .plancard .pt h4{font-size:16px;font-weight:700;} .plancard .pt .c{font-size:12px;color:var(--muted);margin-top:3px;}
.daterow{display:flex;gap:10px;margin-top:14px;}
.daterow .dd{flex:1;background:var(--bg);border-radius:12px;padding:10px 12px;}
.daterow .dd .l{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.daterow .dd .v{font-size:13px;font-weight:700;margin-top:3px;}
.pmused{font-size:12px;color:var(--primary);background:var(--primary-pale);display:inline-block;padding:6px 11px;border-radius:20px;margin-top:12px;}
.coverage{margin-top:12px;border-top:1px solid var(--line);padding-top:12px;}
.coverage ul{list-style:none;margin-top:8px;} .coverage li{font-size:12px;padding:4px 0;display:flex;gap:8px;align-items:flex-start;}
.coverage.collapsed ul,.coverage.collapsed .knowmore{display:none;}
.knowmore{font-size:12px;font-weight:700;color:var(--primary-light);cursor:pointer;margin-top:8px;display:inline-block;}
.ctarow{display:flex;gap:10px;margin-top:14px;}

/* help banner */
.helpbanner{margin:18px 18px 6px;background:var(--primary-pale);border:1.5px dashed var(--primary-light);border-radius:18px;padding:15px 17px;display:flex;align-items:center;gap:13px;cursor:pointer;}
.helpbanner .ic{width:42px;height:42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--primary);flex:0 0 auto;}
.helpbanner .tx{flex:1;} .helpbanner h4{font-size:14px;font-weight:700;} .helpbanner p{font-size:11px;color:var(--muted);margin-top:1px;}

/* chatbot */
.chatscreen{background:#ffffff;}
.chathead{display:flex;align-items:center;gap:12px;padding:6px 18px 12px;background:#fff;border-bottom:1px solid var(--line);}
.chathead .av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary-light),var(--primary));display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.chathead .nm{font-size:16px;font-weight:700;} .chathead .st{font-size:11px;color:var(--live-text);display:flex;align-items:center;gap:5px;}
.chathead .st .d{width:7px;height:7px;border-radius:50%;background:var(--live-text);}
.chatbody{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;}
.entrytag{align-self:center;background:#fff;border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:11px;color:var(--primary);}
.bubble{max-width:80%;padding:12px 15px;border-radius:18px;font-size:13px;line-height:1.4;}
.bubble.bot{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px;}
.bubble.user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:5px;}
.quickreplies{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 14px;}
.qr{background:#fff;border:1.5px solid var(--primary-light);color:var(--primary);border-radius:20px;padding:9px 14px;font-size:12px;cursor:pointer;}
.chatinput{display:flex;gap:9px;padding:12px 16px 16px;background:#fff;border-top:1px solid var(--line);}
.chatinput input{flex:1;border:1px solid var(--line);border-radius:22px;padding:12px 16px;font-family:inherit;font-size:14px;outline:none;background:var(--bg);}
.chatinput .send{width:46px;height:46px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;}
.bubble.typing{color:var(--muted);font-style:italic;}
.botcard{align-self:stretch;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow);font-size:13px;animation:fadein .3s ease both;}
.addrform{display:flex;flex-direction:column;gap:8px;}
.addrform input{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%;background:var(--bg);color:var(--text);}
.addrform .row{display:flex;gap:8px;}
.mapmock{height:124px;border-radius:12px;background:linear-gradient(135deg,#d0e8ee,#c0dce4);position:relative;display:flex;align-items:flex-end;justify-content:center;padding:10px;font-size:11px;color:var(--primary);overflow:hidden;}
.mapmock::before{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:22px 22px;opacity:.55;}
.mapmock .pin{position:absolute;top:40%;left:50%;transform:translate(-50%,-100%);color:var(--red-text);z-index:2;}
.rzp{border-radius:14px;overflow:hidden;border:1px solid var(--line);}
.rzp-h{background:#0c2f63;color:#fff;font-weight:700;font-size:14px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;}
.rzp-h span{font-size:10px;background:rgba(255,255,255,.2);padding:3px 8px;border-radius:10px;}
.rzp-b{padding:14px;}
.rzp-amt{font-size:24px;font-weight:700;color:var(--text);}
.rzp-row{font-size:12px;color:var(--muted);margin:6px 0 12px;}
.srsum-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.srsum-no{font-size:15px;font-weight:700;}
.srsum-cat{font-size:12px;color:var(--muted);margin-top:3px;}
.planpick{align-self:stretch;display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;animation:fadein .3s ease both;}
.planpick:active{transform:scale(.98);border-color:var(--primary-light);}
.pp-ic{width:42px;height:42px;border-radius:12px;background:var(--primary-tint);display:flex;align-items:center;justify-content:center;color:var(--primary);flex:0 0 auto;}
.pp-tx{flex:1;min-width:0;}
.pp-name{font-size:14px;font-weight:700;}
.pp-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.pp-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.pp-go{color:var(--muted);flex:0 0 auto;}

/* profile */
.prof-hero{background:linear-gradient(135deg,var(--primary),var(--primary-light));margin:0 18px 16px;border-radius:24px;padding:24px;color:#fff;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow);}
.prof-hero .av{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex:0 0 auto;}
.prof-hero h3{font-size:19px;font-weight:700;} .prof-hero p{font-size:12px;opacity:.85;margin-top:3px;}
.menu{background:#fff;border:1px solid var(--line);border-radius:20px;margin:0 18px 14px;overflow:hidden;box-shadow:var(--shadow);}
.menu .mi{display:flex;align-items:center;gap:13px;padding:15px 17px;border-bottom:1px solid var(--line);cursor:pointer;}
.menu .mi:last-child{border:none;}
.menu .mi .ic{width:40px;height:40px;border-radius:11px;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;color:var(--primary);flex:0 0 auto;}
.menu .mi .t{flex:1;font-size:14px;} .menu .mi .ar{color:var(--muted);}

/* toast */
.toast{position:absolute;bottom:170px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:#fff;font-size:12px;padding:11px 18px;border-radius:14px;opacity:0;transition:.25s;z-index:80;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* NPS / CCP thin ribbon — above tabbar */
.nps-ribbon,.ccp-ribbon{
  position:absolute;bottom:78px;left:0;right:0;
  background:#fff;border-top:2px solid var(--secondary);
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;z-index:48;
  box-shadow:0 -4px 14px rgba(0,104,119,.1);
}
.nps-ribbon .rib-text,.ccp-ribbon .rib-text{flex:1;font-size:12px;color:var(--text);line-height:1.3;}
.nps-ribbon .rib-cta,.ccp-ribbon .rib-cta{
  background:var(--primary);color:#fff;border:none;border-radius:10px;
  padding:8px 18px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;
}
.nps-ribbon .rib-dismiss,.ccp-ribbon .rib-dismiss{font-size:18px;cursor:pointer;color:var(--muted);background:none;border:none;line-height:1;padding:0 2px;}

/* NPS modal popup */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-box{background:#fff;border-radius:24px;padding:28px 22px 22px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.18);animation:fadein .25s ease both;}
.modal-box .modal-icon{width:52px;height:52px;border-radius:50%;background:var(--primary-tint);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--primary);}
.modal-box h3{font-size:18px;font-weight:700;text-align:center;color:var(--text);margin-bottom:10px;}
.modal-box p{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;}
.modal-box .modal-cta{margin-top:22px;width:100%;}

/* NPS full rating screen */
.nps-bar{display:flex;border-radius:12px;overflow:hidden;margin:0 20px;}
.nps-bar .nb{flex:1;height:46px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s;}
.nps-bar .nb:hover{opacity:.82;}
.nps-bar .nb.sel{outline:3px solid #0d3040;outline-offset:-2px;}
.nps-zone{display:flex;gap:6px;margin:10px 20px 0;}
.nps-zone .nz{flex:1;border-radius:8px;padding:8px 6px;text-align:center;}
.nps-zone .nz .nz-label{font-size:11px;font-weight:700;}
.nps-zone .nz .nz-sub{font-size:9px;margin-top:2px;line-height:1.3;}

/* reusable chip option (feedback flow) */
.ccp-opt{background:var(--primary-pale);border:1px solid var(--primary-tint);color:var(--primary);border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit;}
.ccp-opt.sel{background:var(--primary);color:#fff;}

/* SR status page — sticky help footer */
.sr-help-bar{
  position:absolute;bottom:0;left:0;right:0;height:56px;
  background:var(--primary);display:flex;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;z-index:44;
  box-shadow:0 -4px 14px rgba(0,104,119,.2);
}
.sr-help-bar span{font-size:13px;color:#fff;}
/* Bottom sheet overlay */
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:70;display:flex;flex-direction:column;justify-content:flex-end;}
.sheet{background:#fff;border-radius:24px 24px 0 0;padding:10px 0 28px;}
.sheet-handle{width:40px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:14px;font-weight:700;padding:0 20px 12px;color:var(--text);}
.sheet-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-top:1px solid var(--line);cursor:pointer;}
.sheet-item .si-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.sheet-item .si-tx h4{font-size:14px;font-weight:700;}
.sheet-item .si-tx p{font-size:11px;color:var(--muted);margin-top:1px;}

/* DASHBOARD */
.dashboard{position:absolute;inset:0;overflow-y:auto;display:flex;flex-direction:column;background:#ffffff;}
.dash-header{padding:30px 20px 24px;background:linear-gradient(135deg,var(--primary),var(--primary-light));}
.dash-logo{font-size:26px;font-weight:700;color:#fff;margin-bottom:4px;}
.dash-logo b{color:var(--secondary);font-weight:700;}
.dash-tagline{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:0;}
.dash-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:18px 18px 10px;}
.dash-scenarios{padding:0 14px 24px;display:flex;flex-direction:column;gap:10px;}
.dash-btn{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
.dash-btn:active{transform:scale(.98);border-color:var(--primary-light);}
.dash-btn .dbi{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:22px;}
.dash-btn .dbt{flex:1;}
.dash-btn .dbt h4{font-size:14px;font-weight:700;color:var(--text);}
.dash-btn .dbt p{font-size:11px;color:var(--muted);margin-top:2px;}
.dash-btn .dbgo{color:var(--muted);}

@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.scroll>*{animation:fadein .35s ease both;}
</style>

function npsBarSelect(el, val){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  const fu = document.getElementById('nps-followup');
  const msg = document.getElementById('nps-followup-msg');
  if(!fu || !msg) return;
  fu.style.display = 'block';
  if(val <= 6) msg.textContent = 'We\'re sorry to hear that. Could you tell us what we could have done better?';
  else if(val <= 8) msg.textContent = 'Thanks! What would make your experience even better?';
  else msg.textContent = 'That\'s wonderful! We\'re thrilled you had a great experience. What did you love most?';
}

  toast('Feedback submitted! Thank you 🙏');
  setTimeout(()=>go('home'), 1000);

function pickIssue(iss){if(iss==='Others'){chatStage='issue';typing(()=>bot("Please describe the issue."));return;}chatStage=null;SR.issue=iss;troubleshoot();}
function handleIssueText(v){
  if(v.length<3){typing(()=>{bot('Could you describe the issue in more detail?');chatStage='issue';});return;}
  chatStage=null;SR.issue=v;
  typing(()=>{bot(`Got it — noted as "<b>${v}</b>".`);troubleshoot();});
}
function troubleshoot(){
  typing(()=>{bot('Try remote tech support or go straight to an engineer visit?');opts([{label:'Tech Support',fn:()=>media('Tech Support')},{label:'Engineer Visit',fn:()=>media('Engineer Visit')}]);});
}
function media(mode){
  SR.mode=mode;
  typing(()=>{bot('You can share photos or a short video. (Optional)');opts([{label:'📎 Upload media',fn:()=>{SR.media=true;typing(()=>{bot('📷 2 files received. Thanks!');addressStep();});}},{label:'Skip for now',fn:()=>addressStep()}]);});
}
function addressStep(){
  typing(()=>{bot(`Use your last service address?<br><br>📍 <b>${PRESET_ADDR}</b>`);opts([{label:'Use this address',fn:()=>mapStep()},{label:'Add new address',fn:()=>newAddr()}]);});
}
function mapStep(){
  typing(()=>{bot('Confirm your exact location:');botCard(`<div class="mapmock"><span class="pin">${I.loc.replace('width="16" height="16"','width="30" height="30"')}</span>Drag to adjust • Powai, Mumbai</div>`);opts([{label:'📍 Confirm location',fn:()=>copayStep()}]);});
}
function newAddr(){
  typing(()=>{bot('Enter your new address:');botCard(`<div class="addrform"><input placeholder="Flat / House no."><input placeholder="Society / Building"><input placeholder="Area / Locality"><input placeholder="Landmark"><div class="row"><input placeholder="Pincode"><input placeholder="City"></div><input placeholder="State"><button class="btn full" onclick="saveAddr()">Save &amp; continue</button></div>`);clearOpts();});
}
function saveAddr(){usr('New address saved');typing(()=>{bot('Address saved ✓');mapStep();});}
function copayStep(){
  const cp=SR.plan.copay;
  if(!cp){apptStep();return;}
  typing(()=>{bot(`A copayment of <b>₹${cp}</b> is applicable as per your plan.`);opts([{label:`Pay ₹${cp} now`,fn:()=>razorpay()},{label:'Know more',fn:()=>copayInfo()}]);});
}
function copayInfo(){
  typing(()=>{bot("Copayment is defined in your plan's T&C.");opts([{label:`Pay ₹${SR.plan.copay} now`,fn:()=>razorpay()},{label:'View plan details',fn:()=>go('plan-detail')}]);});
}
function razorpay(){
  typing(()=>{botCard(`<div class="rzp"><div class="rzp-h">Razorpay <span>SECURE</span></div><div class="rzp-b"><div class="rzp-amt">₹${SR.plan.copay}.00</div><div class="rzp-row">UPI · Cards · Netbanking · Wallets</div><button class="btn full" onclick="payDone()">Pay ₹${SR.plan.copay}</button></div></div>`);clearOpts();},500);
}
function payDone(){SR.copayPaid=true;usr(`Paid ₹${SR.plan.copay}`);typing(()=>{bot('✅ Payment successful!');apptStep();});}
function apptStep(){
  typing(()=>{bot('Pick an appointment date:');opts([{label:'Tomorrow · 03 Jun',fn:()=>created('03 Jun 2026')},{label:'Wed · 04 Jun',fn:()=>created('04 Jun 2026')},{label:'Thu · 05 Jun',fn:()=>created('05 Jun 2026')},{label:'No preference',fn:()=>created(null)}]);});
}
function created(date){
  SR.appt=date;
  const num='260602-'+String(Math.floor(Math.random()*90000)+10000);
  typing(()=>{
    bot('🎉 Your service request has been created!');
    const c=CATS[SR.category];
    botCard(`<div class="srsum-top"><div><div class="srsum-no">SR #${num}</div><div class="srsum-cat">${c.label} · ${SR.plan.brand}</div></div><span class="pill live"><span class="d"></span>LIVE</span></div>
      <div class="kv"><span class="k">Plan</span><span class="v">${SR.plan.name}</span></div>
      <div class="kv"><span class="k">Issue</span><span class="v">${SR.issue}</span></div>
      <div class="kv"><span class="k">Mode</span><span class="v">${SR.mode}</span></div>
      <div class="kv"><span class="k">Appointment</span><span class="v">${date||'To be scheduled'}</span></div>
      <div class="kv"><span class="k">Copayment</span><span class="v">${SR.plan.copay?('₹'+SR.plan.copay+' · Paid'):'Not applicable'}</span></div>`);
    const end=[{label:'Track this SR',fn:()=>go('track-sr')},{label:'Back to Home',fn:()=>go('home')}];
    if(SR.support)end.splice(1,0,{label:'⬅ Support menu',fn:()=>supportMenu()});
    opts(end);
  },750);
}
function cantFind(){
  typing(()=>{bot("Let's try to find your plan via another way:");opts([{label:'Try another mobile',fn:()=>{chatStage='mobile';typing(()=>bot('Enter the alternate mobile number. An OTP will be sent.'));}},{label:'Enter email ID',fn:()=>{chatStage='email';typing(()=>bot("Enter the email linked to your plan."));}},{label:'Enter invoice no.',fn:()=>{chatStage='invoice';typing(()=>bot('Enter the invoice number from your receipt.'));}},{label:'Chat with agent',fn:()=>agentMock()},{label:'Request callback',fn:()=>callbackMock()}]);});
}
function cantFindOutcome(msg){
  typing(()=>{bot(msg);opts([{label:'Chat with agent',fn:()=>agentMock()},{label:'Request callback',fn:()=>callbackMock()},{label:'Start over',fn:()=>goChat(SR.source)}]);});
}
function agentMock(){typing(()=>{bot('🟢 Connecting you to a support agent…');opts([{label:'Back to Home',fn:()=>go('home')}]);});}
function callbackMock(){typing(()=>{bot('📞 Callback requested! Our team will call you on +91 98XXX XXX12 shortly.');opts([{label:'Back to Home',fn:()=>go('home')}]);});}
function sendChat(){
  const f=document.getElementById('chatfield');const v=(f.value||'').trim();if(!v)return;
  usr(v);f.value='';
  if(chatStage==='issue'){handleIssueText(v);return;}
  if(chatStage==='mobile'||chatStage==='email'){chatStage='otp';typing(()=>{bot('OTP sent. Enter the 6-digit code.');});return;}
  if(chatStage==='otp'){chatStage=null;cantFindOutcome('No additional plans found. Connect with an agent?');return;}
  if(chatStage==='invoice'){chatStage=null;cantFindOutcome("Invoice not matched. Let me connect you with someone who can help.");return;}
  if(chatStage==='support'){handleSupportText(v);return;}
  supportTopic=supportTopic||'General Query';handleSupportText(v);
}

/* boot → dashboard */
showDashboard();
</script>
</body>
</html>

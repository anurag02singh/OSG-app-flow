<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Onsitego — Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal-900:#143a34; --teal-800:#1a4d44; --teal-700:#235c50; --teal-600:#2d6b5d;
  --teal-500:#3e8576; --teal-100:#dff0ea; --teal-50:#eef7f3;
  --bg:#f2efe7; --card:#ffffff; --text:#14302b; --muted:#7f8f88; --line:#e8e4d9;
  --yellow:#f4c430; --yellow-soft:#fdf3cf; --yellow-text:#b07d09;
  --live-bg:#e1f4e9; --live-text:#1f9a59;
  --blue-bg:#e6eefb; --blue-text:#3266c9;
  --red-bg:#fdecec; --red-text:#d64545;
  --shadow:0 6px 22px rgba(20,48,43,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#cdd8d2;
  background-image:radial-gradient(circle at 20% 10%,#dde7e1,transparent 55%),radial-gradient(circle at 80% 90%,#d3e0d9,transparent 55%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 0;color:var(--text);
}
/* phone frame */
.phone{
  position:relative;width:390px;height:844px;background:#0c1f1b;border-radius:54px;
  padding:13px;box-shadow:0 30px 70px rgba(12,31,27,.45),0 4px 0 rgba(255,255,255,.04) inset;
}
.screenwrap{position:relative;width:100%;height:100%;background:var(--bg);border-radius:42px;overflow:hidden;display:flex;flex-direction:column;}
#screens{position:relative;flex:1;min-height:0;}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#0c1f1b;border-radius:0 0 20px 20px;z-index:60;}
.statusbar{height:50px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 6px;font-size:13px;font-weight:700;color:var(--text);position:relative;z-index:50;flex:0 0 auto;}
.statusbar .dots{display:flex;gap:5px;align-items:center;}
.statusbar .dots span{display:inline-block;}

/* screen scroll area */
.screen{position:absolute;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:96px;}
.scroll::-webkit-scrollbar{width:0;}

/* header */
.appbar{display:flex;align-items:center;justify-content:space-between;padding:6px 20px 10px;}
.logo{display:flex;align-items:center;gap:7px;font-weight:800;font-size:21px;letter-spacing:-.5px;color:var(--teal-800);}
.logo .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--teal-600),var(--teal-800));display:flex;align-items:center;justify-content:center;}
.logo b{color:var(--yellow);}
.appbar-right{display:flex;align-items:center;gap:10px;}
.lang{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;color:var(--teal-800);}
.iconbtn{width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.iconbtn .dot{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--red-text);border:2px solid #fff;}

/* section titles */
.kicker{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--teal-500);text-transform:uppercase;margin:0 20px 2px;}
.sec-title{font-size:21px;font-weight:800;letter-spacing:-.4px;margin:0 20px 14px;display:flex;align-items:center;justify-content:space-between;}
.sec-title .count{font-size:12px;font-weight:700;background:var(--teal-100);color:var(--teal-700);padding:5px 11px;border-radius:20px;}
.sec-title .viewall{font-size:13px;font-weight:700;color:var(--teal-600);cursor:pointer;}
.block{margin-top:26px;}

/* quick actions */
.quick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;padding:4px 20px 0;}
.qa{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px 10px;text-align:center;cursor:pointer;position:relative;transition:.18s;box-shadow:var(--shadow);}
.qa:active{transform:scale(.96);}
.qa .ic{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 9px;}
.qa.p1 .ic{background:var(--teal-100);} .qa.p2 .ic{background:var(--yellow-soft);} .qa.p3 .ic{background:var(--blue-bg);}
.qa .lbl{font-size:12.5px;font-weight:700;line-height:1.2;}
.qa .badge{position:absolute;top:10px;right:12px;background:var(--teal-700);color:#fff;font-size:11px;font-weight:800;min-width:21px;height:21px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;}

/* SR rail */
.rail{display:flex;gap:13px;overflow-x:auto;padding:2px 20px 8px;scroll-snap-type:x mandatory;}
.rail::-webkit-scrollbar{display:none;}
.srcard{flex:0 0 88%;scroll-snap-align:start;background:#fff;border:1px solid var(--line);border-radius:22px;padding:17px;box-shadow:var(--shadow);}
.srcard .top{display:flex;justify-content:space-between;align-items:flex-start;}
.srcard h4{font-size:17px;font-weight:800;}
.srcard .srno{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:7px;}
.srcard .meta{font-size:13px;font-weight:600;margin-top:2px;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:5px 10px;border-radius:20px;}
.pill.live{background:var(--live-bg);color:var(--live-text);} .pill .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
.pill.blue{background:var(--blue-bg);color:var(--blue-text);}
.stamp{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;background:var(--yellow-soft);color:var(--yellow-text);padding:7px 12px;border-radius:20px;margin-top:14px;}
.stamp .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
.srcard .row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px;}
.btn{background:var(--teal-700);color:#fff;border:none;border-radius:14px;padding:11px 18px;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;}
.btn:active{transform:scale(.96);} .btn.ghost{background:#fff;color:var(--teal-700);border:1.5px solid var(--teal-700);}
.btn.full{width:100%;justify-content:center;}
.btn.sm{padding:9px 14px;font-size:12.5px;}
.btn.yellow{background:var(--yellow);color:#5a4400;}
.dots-ind{display:flex;gap:6px;justify-content:center;margin-top:12px;}
.dots-ind i{width:7px;height:7px;border-radius:50%;background:#cdd6d1;}.dots-ind i.on{width:20px;border-radius:4px;background:var(--teal-600);}

/* stats banner */
.statbanner{margin:0 20px;background:linear-gradient(120deg,var(--teal-900),var(--teal-700));border-radius:22px;padding:20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;box-shadow:var(--shadow);}
.statbanner .s{text-align:center;}
.statbanner .n{font-size:23px;font-weight:800;color:var(--yellow);}
.statbanner .t{font-size:11px;color:#cfe3db;font-weight:600;margin-top:3px;}

/* promise */
.promise{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;padding:0 20px;}
.pcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 8px;text-align:center;box-shadow:var(--shadow);}
.pcard .ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 9px;}
.pcard:nth-child(1) .ic{background:var(--teal-100);} .pcard:nth-child(2) .ic{background:var(--yellow-soft);} .pcard:nth-child(3) .ic{background:var(--teal-100);}
.pcard .lbl{font-size:12px;font-weight:700;line-height:1.25;}

/* partners */
.partners{display:flex;gap:10px;overflow-x:auto;padding:0 20px;}
.partners::-webkit-scrollbar{display:none;}
.partner{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 18px;font-weight:800;font-size:14px;box-shadow:var(--shadow);}

/* feedback */
.feedback{margin:0 20px;background:linear-gradient(120deg,var(--teal-600),var(--teal-500));border-radius:22px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow);}
.feedback .ic{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.feedback .tx{flex:1;color:#fff;} .feedback h4{font-size:15.5px;font-weight:800;} .feedback p{font-size:12px;opacity:.9;margin-top:2px;}
.feedback .go{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--teal-700);flex:0 0 auto;}

/* ratings */
.ratings{display:flex;gap:11px;padding:0 20px;}
.rate{flex:1;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow);}
.rate .lg{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px;flex:0 0 auto;}
.rate .sc{font-size:15px;font-weight:800;} .rate .sc small{font-size:11px;color:var(--muted);font-weight:600;} .rate .stars{font-size:10px;color:var(--yellow);}

/* footer */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:78px;background:#fff;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding-bottom:8px;z-index:40;}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--muted);font-size:11px;font-weight:700;flex:1;}
.tab.on{color:var(--teal-700);}
.tab .lbl{line-height:1.05;text-align:center;}

/* floating chat */
.fab{position:absolute;bottom:96px;right:18px;width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,var(--teal-600),var(--teal-800));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(20,48,43,.35);cursor:pointer;z-index:45;}
.fab .d{position:absolute;top:6px;right:8px;width:13px;height:13px;border-radius:50%;background:var(--yellow);border:2px solid #fff;}
.fab:active{transform:scale(.93);}

/* inner page header */
.pagehead{display:flex;align-items:center;gap:12px;padding:6px 18px 14px;}
.pagehead .back{width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;}
.pagehead h2{font-size:20px;font-weight:800;letter-spacing:-.4px;}
.pagehead .sub{font-size:12px;color:var(--muted);font-weight:600;}

/* generic card */
.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;margin:0 18px 14px;box-shadow:var(--shadow);}
.card-h{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.card-h h3{font-size:15.5px;font-weight:800;}
.chev{transition:.25s;color:var(--muted);}
.collapsed .chev{transform:rotate(-90deg);}
.collapsed .card-body{display:none;}
.kv{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line);}
.kv:last-child{border:none;} .kv .k{color:var(--muted);font-weight:600;} .kv .v{font-weight:700;}
.warn{display:flex;align-items:center;gap:8px;background:var(--yellow-soft);color:var(--yellow-text);font-size:12px;font-weight:700;padding:10px 12px;border-radius:12px;margin-top:12px;}
.copay{display:flex;align-items:center;justify-content:space-between;background:var(--red-bg);color:var(--red-text);font-size:13px;font-weight:700;padding:12px 14px;border-radius:14px;margin-top:12px;}

/* timeline */
.tl{margin-top:8px;} .tl .item{display:flex;gap:13px;padding-bottom:4px;}
.tl .marker{display:flex;flex-direction:column;align-items:center;}
.tl .mk{width:14px;height:14px;border-radius:50%;border:3px solid var(--teal-600);background:#fff;margin-top:3px;}
.tl .item.done .mk{background:var(--teal-600);} .tl .item.now .mk{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 0 4px var(--yellow-soft);}
.tl .line{flex:1;width:2px;background:var(--line);min-height:18px;}
.tl .item:last-child .line{display:none;}
.tl .tx{padding-bottom:16px;} .tl .tx .t{font-size:13.5px;font-weight:800;} .tl .tx .d{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px;}

/* doc rows */
.docrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
.docrow:last-child{border:none;}
.docrow .ic{width:40px;height:40px;border-radius:11px;background:var(--teal-50);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--teal-700);}
.docrow .info{flex:1;} .docrow .info .t{font-size:13.5px;font-weight:700;} .docrow .info .s{font-size:11.5px;color:var(--muted);font-weight:600;}
.docrow .acts{display:flex;gap:8px;}
.miniic{width:34px;height:34px;border-radius:10px;background:var(--teal-50);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--teal-700);}

/* capsule */
.capsule{display:inline-flex;align-items:center;gap:8px;background:var(--teal-50);color:var(--teal-800);font-size:12.5px;font-weight:700;padding:9px 14px;border-radius:20px;margin-top:12px;}

/* help grid */
.helpgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.helpbtn{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;}
.helpbtn:active{transform:scale(.97);border-color:var(--teal-500);}
.helpbtn .ic{color:var(--teal-700);display:flex;}

/* tabs */
.tabs{display:flex;gap:8px;background:#e9e5da;border-radius:16px;padding:5px;margin:0 18px 16px;}
.tabs .t{flex:1;text-align:center;padding:10px;font-size:13.5px;font-weight:700;border-radius:12px;cursor:pointer;color:var(--muted);}
.tabs .t.on{background:#fff;color:var(--teal-700);box-shadow:0 2px 8px rgba(20,48,43,.08);}
.tabpane{display:none;} .tabpane.on{display:block;}

/* search */
.search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 15px;margin:0 18px 16px;color:var(--muted);box-shadow:var(--shadow);}
.search input{border:none;outline:none;flex:1;font-family:inherit;font-size:14px;color:var(--text);background:transparent;}

/* plan card */
.plancard{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;margin:0 18px 14px;box-shadow:var(--shadow);}
.plancard .ph{display:flex;gap:13px;align-items:flex-start;}
.plancard .pic{width:50px;height:50px;border-radius:14px;background:var(--teal-100);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--teal-700);}
.plancard .pt{flex:1;} .plancard .pt h4{font-size:16px;font-weight:800;} .plancard .pt .c{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:3px;}
.daterow{display:flex;gap:10px;margin-top:14px;}
.daterow .dd{flex:1;background:var(--bg);border-radius:12px;padding:10px 12px;} .daterow .dd .l{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;} .daterow .dd .v{font-size:13px;font-weight:800;margin-top:3px;}
.pmused{font-size:12px;font-weight:700;color:var(--teal-700);background:var(--teal-50);display:inline-block;padding:6px 11px;border-radius:20px;margin-top:12px;}
.coverage{margin-top:12px;border-top:1px solid var(--line);padding-top:12px;}
.coverage ul{list-style:none;margin-top:8px;} .coverage li{font-size:12.5px;font-weight:600;padding:4px 0;display:flex;gap:8px;align-items:flex-start;}
.coverage.collapsed ul, .coverage.collapsed .knowmore{display:none;}
.knowmore{font-size:12.5px;font-weight:800;color:var(--teal-600);cursor:pointer;margin-top:8px;display:inline-block;}
.ctarow{display:flex;gap:10px;margin-top:14px;}

/* help banner */
.helpbanner{margin:18px 18px 6px;background:var(--teal-50);border:1.5px dashed var(--teal-500);border-radius:18px;padding:15px 17px;display:flex;align-items:center;gap:13px;cursor:pointer;}
.helpbanner .ic{width:42px;height:42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--teal-700);flex:0 0 auto;}
.helpbanner .tx{flex:1;} .helpbanner h4{font-size:14px;font-weight:800;} .helpbanner p{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px;}

/* chatbot */
.chatscreen{background:var(--teal-50);}
.chathead{display:flex;align-items:center;gap:12px;padding:6px 18px 12px;background:#fff;border-bottom:1px solid var(--line);}
.chathead .av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--teal-600),var(--teal-800));display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.chathead .nm{font-size:16px;font-weight:800;} .chathead .st{font-size:11.5px;color:var(--live-text);font-weight:700;display:flex;align-items:center;gap:5px;}
.chathead .st .d{width:7px;height:7px;border-radius:50%;background:var(--live-text);}
.chatbody{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;}
.entrytag{align-self:center;background:#fff;border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:11.5px;font-weight:700;color:var(--teal-700);}
.bubble{max-width:80%;padding:12px 15px;border-radius:18px;font-size:13.5px;font-weight:500;line-height:1.4;}
.bubble.bot{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px;}
.bubble.user{align-self:flex-end;background:var(--teal-700);color:#fff;border-bottom-right-radius:5px;}
.quickreplies{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 14px;}
.qr{background:#fff;border:1.5px solid var(--teal-500);color:var(--teal-700);border-radius:20px;padding:9px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
.chatinput{display:flex;gap:9px;padding:12px 16px 16px;background:#fff;border-top:1px solid var(--line);}
.chatinput input{flex:1;border:1px solid var(--line);border-radius:22px;padding:12px 16px;font-family:inherit;font-size:14px;outline:none;background:var(--bg);}
.chatinput .send{width:46px;height:46px;border-radius:50%;background:var(--teal-700);display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;}

/* profile */
.prof-hero{background:linear-gradient(135deg,var(--teal-700),var(--teal-900));margin:0 18px 16px;border-radius:24px;padding:24px;color:#fff;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow);}
.prof-hero .av{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex:0 0 auto;}
.prof-hero h3{font-size:19px;font-weight:800;} .prof-hero p{font-size:12.5px;opacity:.85;margin-top:3px;}
.menu{background:#fff;border:1px solid var(--line);border-radius:20px;margin:0 18px 14px;overflow:hidden;box-shadow:var(--shadow);}
.menu .mi{display:flex;align-items:center;gap:13px;padding:15px 17px;border-bottom:1px solid var(--line);cursor:pointer;}
.menu .mi:last-child{border:none;} .menu .mi .ic{width:40px;height:40px;border-radius:11px;background:var(--teal-50);display:flex;align-items:center;justify-content:center;color:var(--teal-700);flex:0 0 auto;}
.menu .mi .t{flex:1;font-size:14px;font-weight:700;} .menu .mi .ar{color:var(--muted);}

/* toast */
.toast{position:absolute;bottom:170px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--teal-900);color:#fff;font-size:12.5px;font-weight:600;padding:11px 18px;border-radius:14px;opacity:0;transition:.25s;z-index:80;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.scroll>*{animation:fadein .35s ease both;}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screenwrap" id="root">
    <div class="statusbar">
      <span>9:41</span>
      <span class="dots"><span>📶</span><span>🔋</span></span>
    </div>
    <!-- SCREENS INJECTED BELOW -->
    <div id="screens"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>
<script>

/* ============ NAVIGATION ENGINE ============ */
const mount = document.getElementById('screens');
function render(html){ mount.innerHTML = `<div class="screen active">${html}</div>`; mount.firstChild.scrollTop=0; }
function go(id){ render(SCREENS[id]()); }
function goChat(source){ render(SCREENS.chatbot(source)); }

function toggle(id){ document.getElementById(id).classList.toggle('collapsed'); }
function toggleCov(id){ document.getElementById(id).classList.toggle('collapsed'); }
function switchTab(el,pane){
  el.parentNode.querySelectorAll('.t').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const wrap = el.closest('.scroll');
  wrap.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('on'));
  wrap.querySelector('#'+pane).classList.add('on');
}
let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800);
}
function botReply(txt){
  const body=document.querySelector('.chatbody');
  body.insertAdjacentHTML('beforeend',`<div class="bubble user">${txt}</div>`);
  body.scrollTop=body.scrollHeight;
  setTimeout(()=>{
    body.insertAdjacentHTML('beforeend',`<div class="bubble bot">Sure! Let me help you with "${txt}". One moment while I pull that up…</div>`);
    body.scrollTop=body.scrollHeight;
  },500);
}
function sendChat(){
  const f=document.getElementById('chatfield'); if(!f.value.trim())return;
  botReply(f.value.trim()); f.value='';
}

/* boot */
go('home');
</script>
